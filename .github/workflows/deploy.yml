name: Deploy to hosting

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prd

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: publist
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, intl, pdo_mysql, pdo_sqlite, gd, bcmath, zip, imap
          tools: composer:2
          coverage: none

      - name: Install dependencies (incl. dev, needed by the test suite)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run test suite
        run: vendor/bin/tester tests/

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Load production schema into the smoke-test database
        run: mysql -h127.0.0.1 -uroot publist < db/schema.sql

      # Throwaway config pointing at this job's own MySQL service container -
      # only used for the smoke test below, never uploaded. Real production
      # secrets are generated in a separate step further down, right before
      # upload, so they never sit on disk during the test/analysis steps.
      - name: Generate a throwaway config.local.neon for the smoke test
        env:
          DB_DSN: "mysql:host=127.0.0.1;port=3306;dbname=publist;charset=utf8mb4"
          DB_USER: root
          DB_PASSWORD: ""
          GOOGLE_MAPS_API_KEY: ""
          EMAIL_SERVER: "localhost"
          EMAIL_PORT: 143
          EMAIL_ARGUMENTS: "novalidate-cert"
          EMAIL_USER: ""
          EMAIL_PASSWORD: ""
        run: php bin/write-config-local.php

      - name: Re-install production dependencies (no dev tools shipped to hosting)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      # See modernize-nette-app skill: this is what actually catches a missing
      # config.neon service registration before it reaches production, since
      # the test suite constructs presenters directly and never exercises the
      # real DI container the way a live HTTP request does.
      - name: Smoke test - boot the app and request the homepage
        run: |
          cat > /tmp/router.php <<'PHP'
          <?php
          $docroot = $_SERVER['DOCUMENT_ROOT'];
          $path = parse_url($_SERVER['REQUEST_URI'], PHP_URL_PATH);
          if ($path !== '/' && file_exists($docroot . $path)) { return false; }
          require $docroot . '/index.php';
          PHP
          php -S 127.0.0.1:8080 -t www /tmp/router.php &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in $(seq 1 20); do
            code=$(curl -s -o /tmp/smoke-response.html -w '%{http_code}' http://127.0.0.1:8080/ || true)
            [ -n "$code" ] && [ "$code" != "000" ] && break
            sleep 0.5
          done
          if [ "$code" -ge 500 ] || grep -qiE 'fatal error|uncaught|tracy-error' /tmp/smoke-response.html; then
            cat /tmp/smoke-response.html
            exit 1
          fi

      # Two passes: files first, then empty dirs - a single pass errors on a
      # dir still containing its preserved .gitignore.
      - name: Reset temp/ and log/ after the smoke test
        run: |
          find temp log www/tmp -type f -not -name '.gitignore' -delete
          find temp log www/tmp -mindepth 1 -type d -empty -delete
          rm -f app/config/config.local.neon

      # The real production config, generated only now, right before upload -
      # written directly into the checkout that's about to go over FTP.
      - name: Generate the real production config.local.neon
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_ARGUMENTS: ${{ secrets.EMAIL_ARGUMENTS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: php bin/write-config-local.php

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      # Runs lftp directly (no third-party deploy action) and uploads only
      # real deltas via a content-hash manifest, since mtime-based comparison
      # can't work when every CI checkout resets file mtimes.
      - name: Deploy over FTPS
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          REMOTE_DIR: /public_html
          MANIFEST_NAME: .deploy-manifest.sha256
        run: |
          LFTP_CONNECT_SCRIPT='
          # Fail fast on a broken connection instead of retrying every file,
          # but tolerate one real transient hiccup (seen fetching the
          # manifest itself - a real, existing, 140KB+ file, unlike the
          # small per-file transfers) before giving up.
          set cmd:fail-exit yes
          set net:max-retries 3
          set net:reconnect-interval-base 5
          set net:reconnect-interval-max 10
          set net:timeout 30
          set ftp:passive-mode true
          set ftp:ssl-force true
          set ftp:ssl-protect-data true
          set ssl:verify-certificate yes
          set ssl:check-hostname no
          '

          LOCAL_MANIFEST=$(mktemp)
          REMOTE_MANIFEST=$(mktemp)
          CHANGED=$(mktemp)
          REMOVED=$(mktemp)
          LFTP_SYNC_SCRIPT=$(mktemp)
          trap 'rm -f "$LOCAL_MANIFEST" "$REMOTE_MANIFEST" "$CHANGED" "$REMOVED" "$LFTP_SYNC_SCRIPT"' EXIT

          # 1. Hash every file that should actually be deployed.
          find . -type f \
            ! -path './.git/*' \
            ! -name '.gitignore' \
            ! -name '.gitattributes' \
            ! -path './.github/*' \
            ! -path './node_modules/*' \
            ! -path './tests/*' \
            ! -name 'README.md' \
            ! -name 'CLAUDE.md' \
            ! -name 'Dockerfile' \
            ! -name 'docker-compose.yml' \
            ! -name '.dockerignore' \
            -print0 \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' \
            > "$LOCAL_MANIFEST"

          # 2. Fetch the manifest from previous deploy - stderr kept so a real
          # connection/auth problem is visible, not just "no previous manifest".
          rm -f "$REMOTE_MANIFEST"
          FETCH_LOG=$(mktemp)
          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_SERVER" <<-EOF > "$FETCH_LOG" 2>&1 || true
          $LFTP_CONNECT_SCRIPT
          get "$REMOTE_DIR/$MANIFEST_NAME" -o "$REMOTE_MANIFEST"
          bye
          EOF
          if [ -s "$REMOTE_MANIFEST" ]; then
            echo "Found previous manifest: $(wc -l < "$REMOTE_MANIFEST" | tr -d ' ') entries"
          else
            echo "No previous manifest found (first deploy, or fetch failed):"
            cat "$FETCH_LOG"
          fi
          touch "$REMOTE_MANIFEST"
          rm -f "$FETCH_LOG"

          # 3. Diff
          grep -Fxvf "$REMOTE_MANIFEST" "$LOCAL_MANIFEST" > "$CHANGED" || true
          # Paths gone locally (comm here is fine - both sides are
          # single-column and plain-sorted, which is exactly what comm
          # requires).
          comm -23 \
            <(awk '{print $2}' "$REMOTE_MANIFEST" | sort) \
            <(awk '{print $2}' "$LOCAL_MANIFEST" | sort) \
            > "$REMOVED"

          echo "$(wc -l < "$CHANGED" | tr -d ' ') file(s) changed/new, $(wc -l < "$REMOVED" | tr -d ' ') file(s) removed"

          # 4. Build one lftp script. Directories are created first, one at a
          # time, *before* switching to parallel transfers - doing mkdir and
          # put for the same new directory both under cmd:parallel is a real
          # race (a put can run before its own directory's mkdir finishes),
          # which was observed to spuriously trigger cmd:fail-exit and abort
          # the whole deploy after a single file. Puts/removes run in
          # parallel since they're otherwise fully independent - sequential
          # one-file-at-a-time transfers are what made a large first deploy
          # far slower here than the old mirror --parallel=3 ever was.
          {
            echo "$LFTP_CONNECT_SCRIPT"
            awk '{print $2}' "$CHANGED" | while IFS= read -r path; do dirname "$path"; done | sort -u | while IFS= read -r dir; do
              [ "$dir" != "." ] && echo "mkdir -p -f \"$REMOTE_DIR/$dir\""
            done

            echo "set cmd:parallel 5"
            while IFS= read -r line; do
              path="${line#*  }"
              echo "!echo UPLOADING: $path"
              echo "put \"$path\" -o \"$REMOTE_DIR/$path\""
            done < "$CHANGED"

            while IFS= read -r path; do
              [ -z "$path" ] && continue
              echo "!echo REMOVING: $path"
              echo "rm -f \"$REMOTE_DIR/$path\""
            done < "$REMOVED"

            echo "set cmd:parallel 1"
            echo "!echo UPLOADING MANIFEST"
            echo "put \"$LOCAL_MANIFEST\" -o \"$REMOTE_DIR/$MANIFEST_NAME\""
            echo "bye"
          } > "$LFTP_SYNC_SCRIPT"

          lftp -u "$FTP_USER","$FTP_PASSWORD" "$FTP_SERVER" < "$LFTP_SYNC_SCRIPT"
          echo "Deploy complete."
