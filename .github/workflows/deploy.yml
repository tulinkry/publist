name: Deploy to hosting

on:
  push:
    branches: [master, improve]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prd

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: publist
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.4'
          extensions: curl, mbstring, intl, pdo_mysql, pdo_sqlite, gd, bcmath, zip, imap
          tools: composer:2
          coverage: none

      - name: Install dependencies (incl. dev, needed by the test suite)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Run test suite
        run: vendor/bin/tester tests/

      - name: Run static analysis
        run: vendor/bin/phpstan analyse --no-progress

      - name: Load production schema into the smoke-test database
        run: mysql -h127.0.0.1 -uroot publist < db/schema.sql

      # Throwaway config pointing at this job's own MySQL service container -
      # only used for the smoke test below, never uploaded. Real production
      # secrets are generated in a separate step further down, right before
      # upload, so they never sit on disk during the test/analysis steps.
      - name: Generate a throwaway config.local.neon for the smoke test
        env:
          DB_DSN: "mysql:host=127.0.0.1;port=3306;dbname=publist;charset=utf8mb4"
          DB_USER: root
          DB_PASSWORD: ""
          GOOGLE_MAPS_API_KEY: ""
          EMAIL_SERVER: "localhost"
          EMAIL_PORT: 143
          EMAIL_ARGUMENTS: "novalidate-cert"
          EMAIL_USER: ""
          EMAIL_PASSWORD: ""
        run: php bin/write-config-local.php

      - name: Re-install production dependencies (no dev tools shipped to hosting)
        run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev

      # See modernize-nette-app skill: this is what actually catches a missing
      # config.neon service registration before it reaches production, since
      # the test suite constructs presenters directly and never exercises the
      # real DI container the way a live HTTP request does.
      - name: Smoke test - boot the app and request the homepage
        run: |
          cat > /tmp/router.php <<'PHP'
          <?php
          $docroot = $_SERVER['DOCUMENT_ROOT'];
          $path = parse_url($_SERVER['REQUEST_URI'], PHP_URL_PATH);
          if ($path !== '/' && file_exists($docroot . $path)) { return false; }
          require $docroot . '/index.php';
          PHP
          php -S 127.0.0.1:8080 -t www /tmp/router.php &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in $(seq 1 20); do
            code=$(curl -s -o /tmp/smoke-response.html -w '%{http_code}' http://127.0.0.1:8080/ || true)
            [ -n "$code" ] && [ "$code" != "000" ] && break
            sleep 0.5
          done
          if [ "$code" -ge 500 ] || grep -qiE 'fatal error|uncaught|tracy-error' /tmp/smoke-response.html; then
            cat /tmp/smoke-response.html
            exit 1
          fi

      # Two passes: files first, then empty dirs - a single pass errors on a
      # dir still containing its preserved .gitignore.
      - name: Reset temp/ and log/ after the smoke test
        run: |
          find temp log www/tmp -type f -not -name '.gitignore' -delete
          find temp log www/tmp -mindepth 1 -type d -empty -delete
          rm -f app/config/config.local.neon

      # The real production config, generated only now, right before upload -
      # written directly into the checkout that's about to go over FTP.
      - name: Generate the real production config.local.neon
        env:
          DB_DSN: ${{ secrets.DB_DSN }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          EMAIL_SERVER: ${{ secrets.EMAIL_SERVER }}
          EMAIL_PORT: ${{ secrets.EMAIL_PORT }}
          EMAIL_ARGUMENTS: ${{ secrets.EMAIL_ARGUMENTS }}
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: php bin/write-config-local.php

      # lftp's sftp:// support unconditionally allocates a pseudo-tty to
      # talk to its ssh subprocess (confirmed with upstream - no way to
      # disable it), which fails in the GH Actions runner's non-interactive
      # shell. The native openssh sftp client needs no pty at all, so it
      # replaces lftp entirely for the actual transfer.
      - name: Deploy over SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SFTP_PORT: 222
          REMOTE_DIR: /public_html
          MANIFEST_NAME: .deploy-manifest.sha256
        run: |
          # SSH_ASKPASS_REQUIRE=force makes ssh call this helper for the
          # password instead of prompting on a tty - the only way to do
          # non-interactive password auth without one.
          ASKPASS_SCRIPT=$(mktemp)
          cat > "$ASKPASS_SCRIPT" <<'EOF'
          #!/bin/sh
          echo "$FTP_PASSWORD"
          EOF
          chmod +x "$ASKPASS_SCRIPT"
          export SSH_ASKPASS="$ASKPASS_SCRIPT"
          export SSH_ASKPASS_REQUIRE=force

          SFTP_OPTS=(-oBatchMode=no -oStrictHostKeyChecking=no -oUserKnownHostsFile=/dev/null -oConnectTimeout=15 -P "$SFTP_PORT")

          # Runs one batch file over its own fresh SSH connection. sftp's
          # own exit code already distinguishes failure kinds cleanly: 255
          # is an ssh/connection-level failure (refused/timeout/reset), a
          # lower code is a genuine sftp-protocol error (e.g. a missing
          # file) - no log-scraping needed, unlike the old FTP version.
          run_sftp_batch() {
            timeout "$1" sftp "${SFTP_OPTS[@]}" -b "$2" "$FTP_USER@$FTP_SERVER" < /dev/null
          }

          # The host's connection fails outright (timeout before login)
          # intermittently - wait for it to become reachable with a cheap
          # probe command before attempting the real deploy, rather than
          # wrapping the whole deploy in retries.
          PROBE_BATCH=$(mktemp)
          echo "ls" > "$PROBE_BATCH"
          PROBE_ATTEMPTS=10
          for attempt in $(seq 1 "$PROBE_ATTEMPTS"); do
            echo "Checking SFTP server reachability (attempt $attempt/$PROBE_ATTEMPTS)..."
            PROBE_LOG=$(mktemp)
            if run_sftp_batch 20 "$PROBE_BATCH" > "$PROBE_LOG" 2>&1; then
              echo "Server reachable."
              rm -f "$PROBE_LOG"
              break
            fi
            # Temporary: show the actual sftp/ssh output while diagnosing
            # the very first real run against this host.
            cat "$PROBE_LOG"
            rm -f "$PROBE_LOG"
            if [ "$attempt" -eq "$PROBE_ATTEMPTS" ]; then
              echo "Server unreachable after $PROBE_ATTEMPTS attempts - giving up."
              exit 1
            fi
            sleep 5
          done
          rm -f "$PROBE_BATCH"

          LOCAL_MANIFEST=$(mktemp)
          REMOTE_MANIFEST=$(mktemp)
          CHANGED=$(mktemp)
          REMOVED=$(mktemp)
          MKDIR_BATCH=$(mktemp)
          REMOVE_BATCH=$(mktemp)
          trap 'rm -f "$ASKPASS_SCRIPT" "$LOCAL_MANIFEST" "$REMOTE_MANIFEST" "$CHANGED" "$REMOVED" "$MKDIR_BATCH" "$REMOVE_BATCH"' EXIT

          # 1. Hash every file that should actually be deployed.
          find . -type f \
            ! -path './.git/*' \
            ! -name '.gitignore' \
            ! -name '.gitattributes' \
            ! -path './.github/*' \
            ! -path './node_modules/*' \
            ! -path './tests/*' \
            ! -name 'README.md' \
            ! -name 'CLAUDE.md' \
            ! -name 'Dockerfile' \
            ! -name 'docker-compose.yml' \
            ! -name '.dockerignore' \
            -print0 \
            | xargs -0 sha256sum \
            | sed 's#  \./#  #' \
            > "$LOCAL_MANIFEST"

          # 2. Fetch the manifest from previous deploy.
          FETCH_BATCH=$(mktemp)
          echo "get \"$REMOTE_DIR/$MANIFEST_NAME\" \"$REMOTE_MANIFEST\"" > "$FETCH_BATCH"
          FETCH_LOG=$(mktemp)
          run_sftp_batch 60 "$FETCH_BATCH" > "$FETCH_LOG" 2>&1
          FETCH_EXIT=$?
          rm -f "$FETCH_BATCH"
          if [ -s "$REMOTE_MANIFEST" ]; then
            echo "Found previous manifest: $(wc -l < "$REMOTE_MANIFEST" | tr -d ' ') entries"
          elif [ "$FETCH_EXIT" -eq 255 ]; then
            # exit 255 is ssh's own connection-level failure code - the
            # connection is bad *right now*, so abort immediately instead
            # of proceeding to the much longer upload, which the probe
            # above already demonstrated is no guarantee against (it can
            # pass while this very next connection still fails).
            echo "Manifest fetch failed with a connection-level error (ssh exit 255), not just a missing file - aborting before attempting the upload:"
            cat "$FETCH_LOG"
            rm -f "$FETCH_LOG"
            exit 1
          else
            echo "No previous manifest found (first deploy, or a non-connection fetch failure, exit $FETCH_EXIT):"
            cat "$FETCH_LOG"
          fi
          touch "$REMOTE_MANIFEST"
          rm -f "$FETCH_LOG"

          # 3. Diff
          grep -Fxvf "$REMOTE_MANIFEST" "$LOCAL_MANIFEST" > "$CHANGED" || true
          # Paths gone locally (comm here is fine - both sides are
          # single-column and plain-sorted, which is exactly what comm
          # requires).
          comm -23 \
            <(awk '{print $2}' "$REMOTE_MANIFEST" | sort) \
            <(awk '{print $2}' "$LOCAL_MANIFEST" | sort) \
            > "$REMOVED"

          CHANGED_COUNT=$(wc -l < "$CHANGED" | tr -d ' ')
          REMOVED_COUNT=$(wc -l < "$REMOVED" | tr -d ' ')
          echo "$CHANGED_COUNT file(s) changed/new, $REMOVED_COUNT file(s) removed"

          # 4. Create every ancestor directory the changed files need, one
          # at a time in a single connection, shallowest first - sftp's own
          # mkdir isn't recursive, and doing this before the parallel
          # upload batches avoids a mkdir/put race across connections.
          # "-mkdir" (dash prefix) tolerates a directory that already
          # exists instead of aborting the batch.
          awk '{print $2}' "$CHANGED" | while IFS= read -r path; do
            d=$(dirname "$path")
            while [ "$d" != "." ]; do
              echo "$d"
              d=$(dirname "$d")
            done
          done | sort -u | awk -F/ '{print NF-1, $0}' | sort -n | cut -d' ' -f2- | while IFS= read -r dir; do
            echo "-mkdir \"$REMOTE_DIR/$dir\""
          done > "$MKDIR_BATCH"
          if [ -s "$MKDIR_BATCH" ]; then
            run_sftp_batch 60 "$MKDIR_BATCH"
          fi

          # 5. Upload changed files and delete removed ones. Each chunk is
          # its own SSH connection running in the background - sftp has no
          # equivalent of lftp's cmd:parallel within one connection, so
          # this splits the changed-file list across a handful of
          # concurrent connections instead. "-rm" tolerates a file that's
          # already gone.
          N_PARALLEL=5
          [ "$CHANGED_COUNT" -lt "$N_PARALLEL" ] && N_PARALLEL=$CHANGED_COUNT

          UPLOAD_BATCH_PREFIX=$(mktemp -u)
          if [ "$N_PARALLEL" -gt 0 ]; then
            awk -v n="$N_PARALLEL" -v prefix="$UPLOAD_BATCH_PREFIX" \
              '{ path = $0; sub(/^[^ ]+  /, "", path); print "put \"" path "\" \"" ENVIRON["REMOTE_DIR"] "/" path "\"" > (prefix "." (NR % n)) }' \
              "$CHANGED"
          fi

          [ -s "$REMOVED" ] && while IFS= read -r path; do
            [ -z "$path" ] && continue
            echo "-rm \"$REMOTE_DIR/$path\""
          done < "$REMOVED" > "$REMOVE_BATCH"

          PIDS=()
          for i in $(seq 0 $((N_PARALLEL - 1))); do
            chunk="$UPLOAD_BATCH_PREFIX.$i"
            [ -s "$chunk" ] || continue
            run_sftp_batch 280 "$chunk" &
            PIDS+=($!)
          done
          if [ -s "$REMOVE_BATCH" ]; then
            run_sftp_batch 280 "$REMOVE_BATCH" &
            PIDS+=($!)
          fi
          FAILED=0
          for pid in "${PIDS[@]}"; do
            wait "$pid" || FAILED=1
          done
          rm -f "$UPLOAD_BATCH_PREFIX".*
          if [ "$FAILED" -eq 1 ]; then
            echo "One or more upload/remove batches failed."
            exit 1
          fi

          # 6. Manifest goes last, once every real file above has landed.
          MANIFEST_BATCH=$(mktemp)
          echo "put \"$LOCAL_MANIFEST\" \"$REMOTE_DIR/$MANIFEST_NAME\"" > "$MANIFEST_BATCH"
          run_sftp_batch 60 "$MANIFEST_BATCH"
          rm -f "$MANIFEST_BATCH"

          echo "Deploy complete."
